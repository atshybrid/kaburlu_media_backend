name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DO_SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload dist via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new" \
            dist/ deploy@${{ secrets.DO_SERVER_IP }}:/home/deploy/kaburlu_media_backend/dist_new/

      - name: Upload env file
        env:
          ENV_CONTENT: ${{ secrets.ENV_KABURLU_BACKEND }}
        run: |
          printf '%s' "$ENV_CONTENT" | \
            ssh -i ~/.ssh/deploy_key -o BatchMode=yes \
              deploy@${{ secrets.DO_SERVER_IP }} \
              'cat > ~/kaburlu_media_backend/.env && chmod 600 ~/kaburlu_media_backend/.env'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_SERVER_IP }}
          username: deploy
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            APP="$HOME/kaburlu_media_backend"
            cd "$APP"

            echo "▶ Verify upload"
            test -d dist_new
            ls dist_new/ | head -5

            echo "▶ Swap dist"
            rm -rf dist
            mv dist_new dist

            echo "▶ Resolve PM2 binary"
            PM2=""
            for CANDIDATE in "$(command -v pm2 2>/dev/null || true)" "$HOME/.npm-global/bin/pm2" "/usr/local/bin/pm2" "/usr/bin/pm2"; do
              if [ -n "$CANDIDATE" ] && [ -x "$CANDIDATE" ]; then
                PM2="$CANDIDATE"
                break
              fi
            done
            if [ -z "$PM2" ]; then
              echo "❌ pm2 not found in PATH or known locations"
              echo "PATH=$PATH"
              exit 1
            fi
            echo "pm2 path: $PM2"

            echo "▶ Restart PM2"
            $PM2 reload ecosystem.config.cjs --update-env 2>/dev/null \
              || $PM2 restart kaburlu-api --update-env \
              || $PM2 startOrReload ecosystem.config.cjs --update-env
            $PM2 save || true

            echo "▶ Health check"
            OK=0
            for i in $(seq 1 15); do
              if curl -fsS --max-time 3 "http://127.0.0.1:3001/health/ai" >/dev/null 2>&1; then
                OK=1; echo "✅ Health OK (attempt $i)"; break
              fi
              echo "… waiting ($i/15)"; sleep 3
            done
            if [ $OK -ne 1 ]; then
              echo "❌ Health check failed"
              $PM2 logs kaburlu-api --lines 50 --nostream || true
              exit 1
            fi

            echo "✅ Deployment completed"
