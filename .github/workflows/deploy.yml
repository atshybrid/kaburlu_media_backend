name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Rsync dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_SERVER_IP }}
          username: deploy
          key: ${{ secrets.DO_SSH_KEY }}
          source: "dist/"
          target: "/home/deploy/kaburlu_media_backend/dist_new"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_SERVER_IP }}
          username: deploy
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            cd ~/kaburlu_media_backend

            echo "▶ Sync code to origin/main"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "▶ Move pre-built dist into place"
            rm -rf dist
            mv dist_new dist

            echo "▶ Write ENV file from GitHub Secrets"
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_KABURLU_BACKEND }}
            ENVEOF
            chmod 600 .env || true

            echo "▶ Install prod dependencies"
            rm -rf node_modules
            npm ci --omit=dev

            echo "▶ Generate Prisma client"
            npx prisma generate

            echo "▶ Detect Chromium installation"
            if [ -f "/snap/bin/chromium" ]; then
              CHROME_BIN="/snap/bin/chromium"
            elif [ -f "/usr/bin/chromium" ]; then
              CHROME_BIN="/usr/bin/chromium"
            elif [ -f "/usr/bin/chromium-browser" ]; then
              CHROME_BIN="/usr/bin/chromium-browser"
            else
              echo "⚠️ Chromium not found — PDF generation may not work"
              CHROME_BIN=""
            fi

            echo "▶ Restart PM2"
            export PUPPETEER_EXECUTABLE_PATH="$CHROME_BIN"
            pm2 stop kaburlu-api 2>/dev/null || true
            fuser -k 3001/tcp 2>/dev/null || true
            sleep 2
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save

            echo "▶ Health check"
            PORT=3001
            OK=0
            for i in $(seq 1 20); do
              if curl -fsS --max-time 3 "http://127.0.0.1:${PORT}/health/ai" >/dev/null 2>&1; then
                OK=1; echo "✅ Health check passed (attempt $i)"; break
              fi
              echo "… waiting ($i/20)"; sleep 2
            done
            if [ $OK -ne 1 ]; then
              echo "❌ Health check failed"
              pm2 logs kaburlu-api --lines 50 --nostream || true
              exit 1
            fi

            echo "✅ Deployment completed successfully"
